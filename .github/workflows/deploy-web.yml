name: Deploy web to GitHub Pages

# Builds the Flutter web app and publishes it to the gh-pages branch, which
# GitHub Pages serves at https://<user>.github.io/brown_focus/
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable
          cache: true

      - run: flutter pub get

      # base-href must match the project-pages subpath (the repo name).
      - run: flutter build web --release --base-href /brown_focus/

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          publish_branch: gh-pages
